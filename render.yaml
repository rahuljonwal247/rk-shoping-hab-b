services:
  - type: web
    name: rk-shopping-hub-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rk-shopping-hub-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "*"
      - key: PORT
        value: "5000"

databases:
  - name: rk-shopping-hub-db
    plan: free
    databaseName: rk_shopping_hub
